name: Update Direct Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  update-direct-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update rules
        run: python3 scripts/update_direct_rules.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update direct rules'
          file_pattern: 'rules/policy/direct.list'
